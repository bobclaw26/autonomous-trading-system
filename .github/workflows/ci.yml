name: CI - Test & Build

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-engine.txt
        pip install pytest-cov flake8

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
    - uses: actions/checkout@v4

    - name: Verify Docker configuration files
      run: |
        echo "Checking Docker configuration..."
        test -f Dockerfile && echo "✅ Dockerfile found" || (echo "❌ Dockerfile missing" && exit 1)
        test -f docker-compose.yml && echo "✅ docker-compose.yml found" || (echo "❌ docker-compose.yml missing" && exit 1)
        echo "All Docker configuration files present"

  integration:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-engine.txt

    - name: Run integration tests
      run: |
        pytest tests/integration/ -v --tb=short

  notify:
    needs: [test, build, integration]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check test results
      run: |
        echo "✅ Test Status: ${{ needs.test.result }}"
        echo "✅ Build Status: ${{ needs.build.result }}"
        echo "✅ Integration Status: ${{ needs.integration.result }}"
        
        if [ "${{ needs.test.result }}" == "failure" ]; then
          echo "❌ Test suite failed!"
          exit 1
        fi
        
        if [ "${{ needs.build.result }}" == "failure" ]; then
          echo "❌ Build validation failed!"
          exit 1
        fi
        
        echo "✅ CI Pipeline Successful!"
